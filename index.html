<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モグラ叩きゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>モグラ叩き</h1>

    <section class="score-area" aria-label="ゲーム情報">
      <div class="info-box">
        <span>スコア</span>
        <strong id="score">0</strong>
      </div>
      <div class="info-box">
        <span>残り時間</span>
        <strong><span id="time">30</span>秒</strong>
      </div>
      <div class="info-box">
        <span>最高スコア</span>
        <strong id="bestScore">0</strong>
      </div>
    </section>

    <p id="hitMessage" class="hit-message">叩いたモグラと点数がここに出ます</p>
    <p id="message" class="message">スタートを押して遊ぼう！</p>

    <section id="board" class="board" aria-label="モグラ叩きのマス">
      <button class="hole" type="button" aria-label="穴 1">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 2">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 3">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 4">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 5">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 6">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 7">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 8">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
      <button class="hole" type="button" aria-label="穴 9">
        <img class="mole-image" alt="" draggable="false">
        <span class="boss-health" aria-hidden="true"></span>
      </button>
    </section>

    <div class="controls">
      <button id="startButton" class="control-button" type="button">スタート</button>
      <button id="restartButton" class="control-button secondary" type="button">リスタート</button>
    </div>

    <div class="side-panels">
      <section class="score-history" aria-label="過去のスコア">
        <h2>最近のスコア</h2>
        <p id="scoreCompare" class="score-compare">まだ記録がありません</p>
        <ol id="scoreHistory" class="score-history-list"></ol>
      </section>

      <section class="mole-guide" aria-label="モグラの点数一覧">
        <h2>モグラ点数表</h2>
        <ul class="mole-list">
          <li class="mole-list-item">
            <img src="assets/mole-strong.png" alt="ワルモグラ">
            <div>
              <span class="mole-name">ワルモグラ</span>
              <strong>20点</strong>
              <small>3回叩く</small>
            </div>
          </li>
          <li class="mole-list-item">
            <img src="assets/mole-sprout.png" alt="埋もれモグラ">
            <div>
              <span class="mole-name">埋もれモグラ</span>
              <strong>5点</strong>
              <small>1回叩く</small>
            </div>
          </li>
          <li class="mole-list-item">
            <img src="assets/mole-happy.png" alt="ノーマルモグラ">
            <div>
              <span class="mole-name">ノーマルモグラ</span>
              <strong>10点</strong>
              <small>1回叩く</small>
            </div>
          </li>
          <li class="mole-list-item">
            <img src="assets/mole-bomb.png" alt="爆弾モグラ">
            <div>
              <span class="mole-name">爆弾モグラ</span>
              <strong>-10点</strong>
              <small>叩くと減点</small>
            </div>
          </li>
        </ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
